name: Backtest RSI v10

on:
  # Ejecutar manualmente desde GitHub
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Par de trading'
        required: true
        default: 'XRP/USDT'
      direccion:
        description: 'Dirección (long/short/both)'
        required: true
        default: 'long'
      volumen_ratio:
        description: 'Ratio mínimo de volumen (ej: 1.5)'
        required: true
        default: '1.5'
      sl_pct:
        description: 'Stop Loss % (ej: 0.008)'
        required: true
        default: '0.008'
      tp_pct:
        description: 'Take Profit % (ej: 0.015)'
        required: true
        default: '0.015'

  # O ejecutar automáticamente cada día a las 00:00 UTC
  schedule:
    - cron: '0 0 * * *'

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        pip install pandas numpy ccxt scipy

    - name: Ejecutar backtest v10
      env:
        BITGET_SYMBOL: ${{ github.event.inputs.symbol || 'XRP/USDT' }}
        DIRECCION: ${{ github.event.inputs.direccion || 'long' }}
        VOLUMEN_MIN_RATIO: ${{ github.event.inputs.volumen_ratio || '1.5' }}
        SL_PCT: ${{ github.event.inputs.sl_pct || '0.008' }}
        TP_PCT: ${{ github.event.inputs.tp_pct || '0.015' }}
        BALANCE: '1000'
        LEVERAGE: '5'
        RISK_PER_TRADE: '0.02'
      run: |
        echo "=========================================="
        echo "BOT RSI v10 - Backtest 4H + Volumen"
        echo "Par: $BITGET_SYMBOL"
        echo "Dirección: $DIRECCION"
        echo "Volumen mínimo: ${VOLUMEN_MIN_RATIO}x"
        echo "=========================================="
        python bot_rsi_canales_v10.py

    - name: Guardar resultados
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: resultados-backtest-v10
        path: |
          *.txt
          *.csv
          *.json
        retention-days: 30
