name: Backtest RSI v10.5

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Par de trading'
        required: true
        default: 'ADA/USDT'
      volumen_ratio:
        description: 'Ratio minimo de volumen'
        required: true
        default: '1.2'
      leverage:
        description: 'Apalancamiento (1-20)'
        required: true
        default: '5'
      balance:
        description: 'Balance inicial USD'
        required: true
        default: '1000'
      tp_pct:
        description: 'Take Profit %'
        required: true
        default: '0.020'
      sl_pct:
        description: 'Stop Loss %'
        required: true
        default: '0.008'

jobs:
  backtest:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: pip install pandas numpy ccxt scipy
      
    - name: Ejecutar backtest
      env:
        BITGET_SYMBOL: ${{ github.event.inputs.symbol }}
        VOLUMEN_MIN_RATIO: ${{ github.event.inputs.volumen_ratio }}
        LEVERAGE: ${{ github.event.inputs.leverage }}
        BALANCE: ${{ github.event.inputs.balance }}
        TP_PCT: ${{ github.event.inputs.tp_pct }}
        SL_PCT: ${{ github.event.inputs.sl_pct }}
        LOG_FILE: resultados/backtest_log.txt
      run: |
        mkdir -p resultados
        python bot_rsi_canales_v10.5.py
      
    - name: Guardar logs y resultados
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backtest-${{ github.event.inputs.symbol }}-${{ github.run_id }}
        path: resultados/
        retention-days: 30
