- name: Ejecutar backtest y guardar resultados
  env:
    BITGET_SYMBOL: XRP/USDT
    DIRECCION: both
    LEVERAGE: '5'
  run: |
    python bot_rsi_canales_v10_4.py > resultados_xrp_v10_4.txt
    echo "Backtest completado"
    
- name: Subir resultados
  uses: actions/upload-artifact@v4
  with:
    name: resultados-xrp-backtest
    path: resultados_xrp_v10_4.txt

