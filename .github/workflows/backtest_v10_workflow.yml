name: Backtest RSI v10

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Par de trading'
        required: true
        default: 'XRP/USDT'
      direccion:
        description: 'Direccion (long/short/both)'
        required: true
        default: 'both'
      leverage:
        description: 'Apalancamiento'
        required: true
        default: '5'

jobs:
  backtest:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # <-- Esto descarga tu repo
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: pip install pandas numpy ccxt scipy
      
    - name: Verificar archivos
      run: |
        echo "Archivos en el repo:"
        ls -la *.py || echo "NO HAY ARCHIVOS .py"
        
    - name: Ejecutar backtest
      env:
        BITGET_SYMBOL: ${{ github.event.inputs.symbol }}
        DIRECCION: ${{ github.event.inputs.direccion }}
        LEVERAGE: ${{ github.event.inputs.leverage }}
      run: |
        echo "=========================================="
        echo "BOT RSI v10 - Backtest 4H + Volumen"
        echo "Par: $BITGET_SYMBOL"
        echo "Dirección: $DIRECCION"
        echo "Apalancamiento: ${LEVERAGE}x"
        echo "=========================================="
        python bot_rsi_canales_v10_4.py
        
    - name: Guardar logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: resultados-backtest-v10
        path: '*.txt'
        retention-days: 7
