name: Backtest v8

on: [push, workflow_dispatch]

jobs:
  test-modos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modo: [zona, solo_diagonal, canal]
        direccion: [both, short, long]
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: pip install pandas numpy ccxt scipy
      
      - name: Backtest ${{ matrix.modo }} - ${{ matrix.direccion }}
        env:
          MODO: ${{ matrix.modo }}
          DIRECCION: ${{ matrix.direccion }}
          SL_PCT: "0.008"
          TP_PCT: "0.015"
          BITGET_SYMBOL: "XRP/USDT"
        run: python backtest_rsi_canales.py
