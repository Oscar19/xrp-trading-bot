name: RSI Canales Multi-TF cada 15 minutos

on:
  schedule:
    - cron: '*/15 * * * *'  # Cada 15 minutos (suficiente para 1h/4h)
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install ccxt pandas numpy scipy requests

    - name: Run RSI Canales Bot
      env:
        # Telegram
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        
        # Trading config
        BITGET_SYMBOL: XRP/USDT
        LEVERAGE: "5"
        RISK_PER_TRADE: "0.02"
        BALANCE: "1000"
        
        # Algoritmo config
        MIN_R2_CANAL: "0.3"
        MIN_R2_DIAGONAL: "0.3"
        UMBRAL_REBOTE: "1.15"
        
        # Modo DEMO primero (cambiar a false cuando estés listo)
        DEMO_MODE: "true"
      run: python bitget_rsi_canales.py
