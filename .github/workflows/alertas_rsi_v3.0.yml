name: Alertas RSI Canales v3.0 (Paralelo)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      modo_test:
        description: 'Modo test (true/false)'
        required: true
        default: 'false'

jobs:
  alertas:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: pip install pandas numpy ccxt scipy requests

    - name: Ejecutar alertas v3.0
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        VOLUMEN_MIN_RATIO: '1.2'
        MODO_TEST: ${{ github.event.inputs.modo_test || 'false' }}
      run: python alertas_rsi_canales.py

    - name: Guardar logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: alertas-v3-${{ github.run_id }}
        path: alertas_log.txt
        retention-days: 7
