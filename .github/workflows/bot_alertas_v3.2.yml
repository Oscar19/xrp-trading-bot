name: Bot Alertas RSI Canales v3.2

on:
  schedule:
    - cron: '5 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  alertas:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: pip install pandas numpy ccxt scipy requests

    - name: Ejecutar bot de alertas
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MODO_TEST: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      run: |
        echo "TELEGRAM_BOT_TOKEN está configurado: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}"
        echo "TELEGRAM_CHAT_ID está configurado: ${{ secrets.TELEGRAM_CHAT_ID != '' }}"
        python bot_alertas_v3.2.py
