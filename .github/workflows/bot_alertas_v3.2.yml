name: Bot Alertas RSI Canales v3.2

on:
  schedule:
    # Ejecutar cada 4 horas (alineado con timeframe 4H)
    - cron: '5 */4 * * *'
  workflow_dispatch:

jobs:
  alertas:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: pip install pandas numpy ccxt scipy requests

    - name: Ejecutar bot de alertas
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MODO_TEST: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      run: python bot_alertas_v3.2.py
