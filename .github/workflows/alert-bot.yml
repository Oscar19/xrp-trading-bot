name: Alertas Bitget cada 5 minutos

on:
  schedule:
    - cron: '*/5 * * * *'  # Cada 5 minutos
  workflow_dispatch:  # Tambien manual desde GitHub

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install ccxt ta pandas numpy requests

    - name: Run alert bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        BITGET_SYMBOL: XRP/USDT
        LEVERAGE: "5"
        RISK_PER_TRADE: "0.02"
        STOP_LOSS: "0.015"
        TAKE_PROFIT: "0.03"
        BALANCE: "1000"
      run: python bitget_telegram_bot.py
