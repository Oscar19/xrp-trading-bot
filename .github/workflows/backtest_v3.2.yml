name: Backtest RSI Canales v3.2 (3 Estrategias + Divergencia)

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Par de trading'
        required: true
        default: 'ADA/USDT'
      timeframe:
        description: 'Timeframe'
        required: true
        default: '4h'
      leverage:
        description: 'Apalancamiento'
        required: true
        default: '5'
      balance:
        description: 'Balance inicial'
        required: true
        default: '1000'
      div_usar_filtro:
        description: 'Usar divergencia como filtro (true/false)'
        required: true
        default: 'true'
      div_estrategia_ind:
        description: 'Activar estrategia divergencia independiente (true/false)'
        required: true
        default: 'true'
      div_order:
        description: 'Order para pivots de divergencia (1-5)'
        required: true
        default: '3'
      div_lookback:
        description: 'Lookback para divergencia (bars)'
        required: true
        default: '25'
      div_rsi_max:
        description: 'RSI maximo para divergencia alcista'
        required: true
        default: '40'

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: pip install pandas numpy ccxt scipy

    - name: Sanitizar nombre
      id: sanitize
      run: |
        SYMBOL="${{ github.event.inputs.symbol }}"
        SYMBOL_SAFE="${SYMBOL_SAFE//\//_}"
        echo "artifact_name=backtest-v3.2-${SYMBOL_SAFE}-${{ github.run_id }}" >> $GITHUB_OUTPUT
        mkdir -p resultados

    - name: Ejecutar backtest v3.2
      env:
        BITGET_SYMBOL: ${{ github.event.inputs.symbol }}
        TIMEFRAME: ${{ github.event.inputs.timeframe }}
        LEVERAGE: ${{ github.event.inputs.leverage }}
        BALANCE: ${{ github.event.inputs.balance }}
        DIV_USAR_FILTRO: ${{ github.event.inputs.div_usar_filtro }}
        DIV_ESTRATEGIA_IND: ${{ github.event.inputs.div_estrategia_ind }}
        DIV_ORDER: ${{ github.event.inputs.div_order }}
        DIV_LOOKBACK: ${{ github.event.inputs.div_lookback }}
        DIV_RSI_MAX: ${{ github.event.inputs.div_rsi_max }}
        LOG_FILE: resultados/backtest_v3.2_log.txt
        OUTPUT_DIR: resultados
      run: python backtest_v3.2.py

    - name: Guardar resultados
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.sanitize.outputs.artifact_name }}
        path: resultados/
        retention-days: 30

    - name: Mostrar resumen
      if: always()
      run: |
        echo "=== RESUMEN BACKTEST v3.2 ==="
        cat resultados/backtest_v3.2_log.txt | tail -50
